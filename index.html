<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramazan Otomatik Sayaç</title>
    <style>
        :root {
            --gold: #f59e0b;
            --dark: #020617;
        }

        body {
            margin: 0;
            background: var(--dark);
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            /* Metin seçimini engeller */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            scrollbar-gutter: stable;
            /* Kaydırma çubuğu kaynaklı yatay kaymaları önler */
        }

        .container {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.5) 0%, rgba(14, 24, 66, 0.7) 100%), url('bg.webp') no-repeat 20% 75%;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            box-sizing: border-box;
            position: relative;
        }

        @media (min-width: 450px) {
            .container {
                max-width: 430px;
                min-height: 808px;
                border: 1px solid #1e293b;
                border-radius: 30px;
                margin: 20px;
            }
        }

        #liveClock {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 2px;
            font-variant-numeric: tabular-nums;
            /* Rakam genişliklerini sabitler */
        }

        #fullDate {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select {
            width: 90%;
            padding: 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid var(--gold);
            font-size: 1.1rem;
            outline: none;
            margin-bottom: 20px;
            cursor: pointer;
        }

        select option {
            background: #0f172a;
            color: white;
        }

        #mainContent {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .iftar-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .iftar-info strong {
            font-size: 3.5rem;
            color: white;
            display: block;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 350px;
        }

        .timer-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 5px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timer-item div:first-child {
            font-size: 2rem;
            font-weight: bold;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
            font-variant-numeric: tabular-nums;
            /* Rakam genişliklerini sabitler */
        }

        .timer-item div:last-child {
            font-size: 0.8rem;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .date-display {
            margin-top: 15px;
            font-size: 0.9rem;
            opacity: 0.6;
        }

        .footer {
            margin-top: auto;
            padding-top: 30px;
            font-size: 0.9rem;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        .footer a {
            color: white;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: var(--gold);
        }

        /* İlerleme Çubuğu */
        .progress-container {
            width: 100%;
            max-width: 360px;
            height: 40px;
            background: #ef4444;
            border-radius: 25px;
            margin: 20px 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #22c55e;
            transition: width 1s linear;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        .progress-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            white-space: nowrap;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        /* Sahur Modu - Gece Teması */
        .sahur-mode .container {
            background: linear-gradient(180deg, rgba(30, 27, 75, 0.7) 0%, rgba(2, 6, 23, 0.9) 100%), url('bg.webp') no-repeat 20% 75%;
            background-size: cover;
            border-color: #312e81;
        }

        .sahur-mode #iftarTimeDisplay {
            color: #818cf8;
            text-shadow: 0 0 15px rgba(129, 140, 248, 0.4);
        }

        /* Bayram Namazı Kutusu */
        #bayramNamazContainer {
            text-align: center;
            margin-top: 15px;
            font-size: 1.1rem;
            color: var(--gold);
            letter-spacing: 1px;
            font-weight: bold;
        }

        #bayramNamazTime {
            color: white;
            font-size: 1.4rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            margin-left: 5px;
        }

        /* İftar Time Display */
        #iftarTimeDisplay {
            transition: color 0.5s ease, text-shadow 0.5s ease;
        }

        /* Bayram Mesajı Stili */
        #bayramMessage {
            display: none;
            text-align: center;
            margin-top: 50px;
            animation: fadeIn 1s ease-in-out;
        }

        #bayramMessage h2 {
            font-size: 3.5rem;
            color: var(--gold);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
        }

        #bayramMessage p {
            font-size: 1.2rem;
            opacity: 0.8;
            color: white;
        }

        /* Hadis Kutusu */
        .hadis-container {
            background: rgba(245, 158, 11, 0.05);
            border-left: 3px solid var(--gold);
            padding: 10px 15px;
            margin: 0 0 20px 0;
            border-radius: 0 15px 15px 0;
            text-align: center;
            width: 400px;
            /* Sabit 400px ile her halükarda genişlik zorlanır */
            max-width: 100%;
            /* Mobilde taşmasın */
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-style: italic;
            overflow-y: auto;
            box-sizing: border-box;
            /* Genişlik hesaplamasını sabitler */
            scrollbar-width: thin;
            /* Daha kibar bir kaydırma çubuğu */
        }

        .hadis-text {
            font-size: 0.9rem;
            color: #f8fafc;
            line-height: 1.5;
            margin-bottom: 5px;
        }

        .hadis-source {
            font-size: 0.8rem;
            opacity: 0.6;
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

                return;
            } else {
                if (document.getElementById('mainContent')) document.getElementById('mainContent').style.display = 'block';
                if (document.getElementById('citySelect')) document.getElementById('citySelect').style.display = 'inline-block';
                if (document.getElementById('bayramMessage')) document.getElementById('bayramMessage').style.display = 'none';
            }

            // 2027 Ramazan Sayaç Kontrolü (23 Mart 2026'dan İtibaren)
            const nextRamadan = new Date('2027-02-08T00:00:00');
            if (now >= new Date('2026-03-23T00:00:00') && now < nextRamadan) {
                const diff = nextRamadan - now;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('dateLabel').innerText = "Gelecek Ramazan";
                const vakitLabel = document.getElementById('vakitLabel');
                if (vakitLabel) {
                    vakitLabel.innerText = "RAMAZAN AYINA";
                    vakitLabel.style.opacity = "1";
                }
                document.getElementById('iftarTimeDisplay').innerText = `${days} Gün Var`;
                
                document.getElementById('h').innerText = h.toString().padStart(2, '0');
                document.getElementById('m').innerText = m.toString().padStart(2, '0');
                document.getElementById('s').innerText = s.toString().padStart(2, '0');

                // İlerleme çubuğunu gizle (uzun süreli sayaç için)
                const progressContainer = document.querySelector('.progress-container');
                if (progressContainer) progressContainer.style.display = 'none';
                
                const timerGrid = document.querySelector('.timer-grid');
                if (timerGrid) timerGrid.style.display = 'grid';

                document.body.classList.remove('sahur-mode');
                return; 
            }

            let index = dayOfMonth - 1;
            if (index < 0) index = 0;

            const bugunVakit = vakitler[city][index] || vakitler[city][vakitler[city].length - 1];
            const yarinVakit = vakitler[city][index + 1] || bugunVakit;
            const dunVakit = vakitler[city][index - 1] || bugunVakit;

            document.getElementById('bayramNamazTime').innerText = bayramNamazVakitleri[city] || "--:--";



            const imsakTarget = new Date(now);
            const [imH, imM] = bugunVakit.im.split(':');
            imsakTarget.setHours(parseInt(imH), parseInt(imM), 0);

            const iftarTarget = new Date(now);
            const [ifH, ifM] = bugunVakit.if.split(':');
            iftarTarget.setHours(parseInt(ifH), parseInt(ifM), 0);

            let target, startTime;
            let isSahur = false;

            if (now < imsakTarget) {
                // Sahura kadar (Dün iftardan bugün imsaka)
                target = imsakTarget;
                isSahur = true;

                startTime = new Date(now);
                startTime.setDate(startTime.getDate() - 1);
                const [difH, difM] = dunVakit.if.split(':');
                startTime.setHours(parseInt(difH), parseInt(difM), 0);

                document.getElementById('dateLabel').innerText = "Bugün";
                document.getElementById('vakitLabel').innerText = "İMSAK VAKTİ (SAHUR)";
                document.getElementById('iftarTimeDisplay').innerText = bugunVakit.im;
            } else if (now < iftarTarget) {
                // İftara kadar (Bugün imsaktan bugün iftara)
                target = iftarTarget;
                isSahur = false;
                startTime = imsakTarget;

                document.getElementById('dateLabel').innerText = "Bugün";
                document.getElementById('vakitLabel').innerText = "İFTAR VAKTİ";
                document.getElementById('iftarTimeDisplay').innerText = bugunVakit.if;
            } else {
                // İftar geçti, yarına imsak say (Bugün iftardan yarın imsaka)
                target = new Date(now);
                target.setDate(target.getDate() + 1);
                const [nimH, nimM] = yarinVakit.im.split(':');
                target.setHours(parseInt(nimH), parseInt(nimM), 0);
                isSahur = true;
                startTime = iftarTarget;

                document.getElementById('dateLabel').innerText = "Yarın";
                document.getElementById('vakitLabel').innerText = "İMSAK VAKTİ (SAHUR)";
                document.getElementById('iftarTimeDisplay').innerText = yarinVakit.im;
            }
            if (isSahur) {
                document.body.classList.add('sahur-mode');
            } else {
                document.body.classList.remove('sahur-mode');
            }

            // Bayram Arifesi Akşamı Kontrolü (19 Mart İftardan Sonra)
            const vakitLabel = document.getElementById('vakitLabel');
            if (year === 2026 && month === 2 && dayOfMonth === 19 && now >= iftarTarget) {
                document.getElementById('dateLabel').innerText = "Ramazan Bayramınız";
                if (vakitLabel) {
                    vakitLabel.innerText = "Mübarek olsun";
                    vakitLabel.style.opacity = "1";
                }
                document.getElementById('iftarTimeDisplay').innerText = "İyi Bayramlar";

                const timerGrid = document.querySelector('.timer-grid');
                const progressContainer = document.querySelector('.progress-container');
                if (timerGrid) timerGrid.style.display = 'none';
                if (progressContainer) progressContainer.style.display = 'none';

                document.body.classList.remove('sahur-mode');
            } else {
                if (vakitLabel) vakitLabel.style.opacity = "0.6";
                const timerGrid = document.querySelector('.timer-grid');
                const progressContainer = document.querySelector('.progress-container');
                if (timerGrid) timerGrid.style.display = 'grid';
                if (progressContainer) progressContainer.style.display = 'block';
            }

            // İlerleme hesaplama
            const totalDuration = target - startTime;
            const elapsed = now - startTime;
            let percent = (elapsed / totalDuration) * 100;
            percent = Math.max(0, Math.min(100, percent));
            const bar = document.getElementById('progressBar');
            const text = document.getElementById('progressText');
            bar.style.width = percent + "%";

            const diff = target - now;
            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);

            text.innerText = `${h} Saat ${m} Dakika kaldı`;

            document.getElementById('h').innerText = h.toString().padStart(2, '0');
            document.getElementById('m').innerText = m.toString().padStart(2, '0');
            document.getElementById('s').innerText = s.toString().padStart(2, '0');
        }

        setInterval(calculate, 1000);
        calculate();

        // Sağ tık engelleme
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        // Klavye kısayollarını engelleme (F12, Ctrl+Shift+I, Ctrl+U)
        document.addEventListener('keydown', (e) => {
            if (
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                (e.ctrlKey && e.key === 'u') ||
                (e.ctrlKey && e.shiftKey && e.key === 'J') ||
                (e.ctrlKey && e.shiftKey && e.key === 'C')
            ) {
                e.preventDefault();
                return false;
            }
        });

        // Görsellerin sürüklenmesini engelleme
        document.addEventListener('dragstart', (e) => {
            if (e.target.nodeName === 'IMG') {
                e.preventDefault();
            }
        });
    </script>
</body>

</html>
